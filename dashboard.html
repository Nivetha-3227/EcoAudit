<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar">
        <span class="nav-logo">🌱 EcoAudit</span>
        <div class="nav-right">
            <span id="nav-username"></span>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div class="dashboard-container">

        <!-- ROW 1: STAT CARDS -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Waste Logged</h3>
                <p id="total-weight">0 kg</p>
            </div>
            <div class="stat-card">
                <h3>Times Disposed</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Most Frequent Location</h3>
                <p id="top-category">-</p>
            </div>
        </div>

        <!-- ROW 2: TOP 3 + NOTICE BOARD -->
        <div class="two-col-row">
            <div class="top-waste-section">
                <h2 class="section-title">Top Waste Categories</h2>
                <div id="top-waste-list" class="top-waste-grid-vertical"></div>
            </div>
            <div class="notice-board-section">
                <h2 class="section-title">📢 Notice Board</h2>
                <div id="notice-list"></div>
            </div>
        </div>

        <!-- ROW 3: MAP -->
        <div class="map-section">
            <div id="map"></div>
        </div>

        <!-- ROW 4: LAST 5 ENTRIES -->
        <div class="entries-section">
            <div class="entries-header-row">
                <button class="dropdown-btn" onclick="toggleEntries()">
                    Past Entries ▼
                </button>
                <a href="history.html" class="view-all-btn">View All History →</a>
            </div>
            <div id="entries-list" style="display:none;"></div>
        </div>

        <!-- ROW 5: DISPOSE NOW -->
        <button class="dispose-btn" onclick="openModal()">🗑️ Dispose Now</button>

    </div>

    <!-- NOTICE POPUP -->
    <div id="notice-modal" style="display:none;">
        <div class="modal-box">
            <h2 id="notice-modal-title"></h2>
            <p id="notice-modal-message"></p>
            <p id="notice-modal-date"></p>
            <div class="modal-buttons">
                <button class="primary-btn" onclick="closeNoticeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- DISPOSE MODAL -->
    <div id="modal" style="display:none;">
        <div class="modal-box">
            <h2>Log Waste</h2>
            <select id="waste-category">
                <option value="">Select Category</option>
                <option value="Plastic">Plastic</option>
                <option value="E-Waste">E-Waste</option>
                <option value="Organic">Organic</option>
                <option value="Metal">Metal</option>
                <option value="Paper">Paper</option>
                <option value="Glass">Glass</option>
            </select>
            <input type="number" id="waste-weight" placeholder="Weight (kg)" />
            <p id="location-status">📍 Location will be captured on submit</p>
            <div class="modal-buttons">
                <button class="primary-btn" onclick="submitWaste()">Submit</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
            <p id="modal-message"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="supabase.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
