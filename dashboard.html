<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <!-- TOP NAV BAR -->
    <nav class="navbar">
        <span class="nav-logo">🌱 EcoAudit</span>
        <div class="nav-right">
            <span id="nav-username"></span>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <!-- STAT CARDS -->
    <div class="dashboard-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Waste Logged</h3>
                <p id="total-weight">0 kg</p>
            </div>
            <div class="stat-card">
                <h3>Times Disposed</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Most Frequent Category</h3>
                <p id="top-category">-</p>
            </div>
        </div>
        <!-- TOP 3 WASTE TYPES -->
<div class="top-waste-section">
    <h2 class="section-title">Top Waste Categories</h2>
    <div id="top-waste-list" class="top-waste-grid"></div>
</div>
        <!-- MAP -->
        <div id="map"></div>

        <!-- PAST ENTRIES DROPDOWN -->
        <div class="entries-section">
            <button class="dropdown-btn" onclick="toggleEntries()">
                Past Entries ▼
            </button>
            <div id="entries-list" style="display:none;"></div>
        </div>

        <!-- DISPOSE NOW BUTTON -->
        <button class="dispose-btn" onclick="openModal()">🗑️ Dispose Now</button>
    </div>

    <!-- MODAL POPUP -->
    <div id="modal" style="display:none;">
        <div class="modal-box">
            <h2>Log Waste</h2>
            <select id="waste-category">
                <option value="">Select Category</option>
                <option value="Plastic">Plastic</option>
                <option value="E-Waste">E-Waste</option>
                <option value="Organic">Organic</option>
                <option value="Metal">Metal</option>
                <option value="Paper">Paper</option>
                <option value="Glass">Glass</option>
            </select>
            <input type="number" id="waste-weight" placeholder="Weight (kg)" />
            <p id="location-status">📍 Location will be captured on submit</p>
            <div class="modal-buttons">
                <button class="primary-btn" onclick="submitWaste()">Submit</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
            <p id="modal-message"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="supabase.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
