<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit - History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-logo">🌱 EcoAudit</span>
        <div class="nav-right">
            <span id="nav-username"></span>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="history-header">
            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
            <h1 class="history-title">Full Disposal History</h1>
        </div>
        <div id="history-list"></div>
    </div>

    <!-- PHOTO VIEWER -->
    <div id="photo-modal" style="display:none;" onclick="closePhoto()">
        <div class="photo-modal-box">
            <img id="photo-modal-img" src="" />
            <p style="color:white; text-align:center; margin-top:8px;">Click anywhere to close</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="history.js"></script>
</body>
</html>
