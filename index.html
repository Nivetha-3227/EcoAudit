<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>🌱 EcoAudit</h1>
            <p class="tagline">Track your waste. Help the planet.</p>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
            </div>

            <div id="login-form">
                <input type="text" id="login-username" placeholder="Username" />
                <input type="password" id="login-password" placeholder="Password" />
                <button class="primary-btn" onclick="login()">Login</button>
            </div>

            <div id="signup-form" style="display:none;">
                <input type="text" id="signup-username" placeholder="Username" />
                <input type="password" id="signup-password" placeholder="Password" />
                <button class="primary-btn" onclick="signup()">Create Account</button>
            </div>

            <p id="auth-message"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
</body>
</html>
